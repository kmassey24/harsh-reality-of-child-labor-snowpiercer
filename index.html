<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
}

#map {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 100%;
}

#btn-spin {
    font: bold 11px/16px Arial, Helvetica, sans-serif;
    background-color: #3386c0;
    color: #fff;
    position: absolute;
    bottom: 20px;           /* move to bottom */
    left: 50%;
    transform: translateX(-50%);  /* perfectly center */
    z-index: 3;
    border: none;
    width: 140px;           /* smaller width */
    cursor: pointer;
    padding: 6px 10px;      /* smaller padding */
    border-radius: 6px;
}

#btn-spin:hover {
    background-color: #4ea0da;
}

#title-box {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 3;
    color: white;
    background: rgba(0, 0, 0, 0.65);
    padding: 16px 20px;
    border-radius: 10px;
    max-width: 360px;
}

#title-box h1 {
    margin: 0 0 8px 0;
    font-size: 28px;
}

#title-box p {
    margin: 0;
    font-size: 14px;
    line-height: 1.4;
}

.w-marker-red {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #c61f1f;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    border: 2px solid white;
    box-shadow: 0 0 6px rgba(0,0,0,0.4);
    cursor: pointer;
}

.w-marker-yellow {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #f1c40f;  /* yellow */
    color: black;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    border: 2px solid white;
    box-shadow: 0 0 6px rgba(0,0,0,0.4);
    cursor: pointer;
}

.mapboxgl-popup-content {
    font-family: Arial, Helvetica, sans-serif;
    padding: 12px;
    max-width: 240px;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="title-box">
    <h1>Harsh Reality of Child Labor</h1>
    <p>Inspired by <em>Snowpiercer</em>. This map traces the Wilford train route with clickable stops and a connected path to learn about...</p>
</div>

<button id="btn-spin">Pause rotation</button>

<script>
mapboxgl.accessToken = 'pk.eyJ1Ijoia21hc3NleTI0IiwiYSI6ImNtbmh2M2twZTA2dDYycXE0bzk4MnF0MHUifQ.KoZTF78tepyeEzVhuHST0g';

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/standard-satellite',
    projection: 'globe',
    zoom: 1.4,
    center: [15, 20]
});

map.on('style.load', () => {
    map.setFog({});
});

/* ROTATION */
const secondsPerRevolution = 120;
const maxSpinZoom = 5;
const slowSpinZoom = 3;

let userInteracting = false;
let spinEnabled = true;

function spinGlobe() {
    const zoom = map.getZoom();
    if (spinEnabled && !userInteracting && zoom < maxSpinZoom) {
        let distancePerSecond = 360 / secondsPerRevolution;

        if (zoom > slowSpinZoom) {
            const zoomDif = (maxSpinZoom - zoom) / (maxSpinZoom - slowSpinZoom);
            distancePerSecond *= zoomDif;
        }

        const center = map.getCenter();
        center.lng -= distancePerSecond;

        map.easeTo({
            center,
            duration: 1000,
            easing: n => n
        });
    }
}

map.on('mousedown', () => { userInteracting = true; });
map.on('mouseup', () => { userInteracting = false; spinGlobe(); });
map.on('dragend', () => { userInteracting = false; spinGlobe(); });
map.on('pitchend', () => { userInteracting = false; spinGlobe(); });
map.on('rotateend', () => { userInteracting = false; spinGlobe(); });
map.on('moveend', () => { spinGlobe(); });

document.getElementById('btn-spin').addEventListener('click', (e) => {
    spinEnabled = !spinEnabled;
    if (spinEnabled) {
        spinGlobe();
        e.target.innerHTML = 'Pause rotation';
    } else {
        map.stop();
        e.target.innerHTML = 'Start rotation';
    }
});

/* APPROXIMATE WILFORD ROUTE POINTS
   Replace or add coordinates to match your exact project map */
const routePoints = [

    { name: "Bangkok", coordinates: [100.5018, 13.7563], description: "Southeast Asia route point.", link: "https://www.unicef.org/eap/" },
    { name: "Jakarta", coordinates: [106.8456, -6.2088], description: "Indonesia route point.", link: "https://www.ilo.org/" },
    { name: "Perth", coordinates: [115.8605, -31.9505], description: "Western Australia route point.", link: "https://en.wikipedia.org/wiki/Snowpiercer" },

    { name: "Sydney", coordinates: [151.2093, -33.8688], description: "Eastern Australia route point.", link: "https://snowpiercer.fandom.com/wiki/Snowpiercer" },
    { name: "Brisbane", coordinates: [153.0251, -27.4698], description: "Northeastern Australia route point.", link: "https://en.wikipedia.org/wiki/Snowpiercer" },
    { name: "Anchorage", coordinates: [-149.9003, 61.2181], description: "Pacific return route point.", link: "https://snowpiercer.fandom.com/wiki/Snowpiercer" }
];

/* MARKERS + POPUPS */
routePoints.forEach(point => {
    const el = document.createElement('div');

    // choose color
    if (point.color === "yellow") {
        el.className = 'w-marker-yellow';
    } else {
        el.className = 'w-marker-red';
    }
    
    el.textContent = 'W';

    const popup = new mapboxgl.Popup({ offset: 25 }).setHTML(`
        <h3>${point.name}</h3>
        <p>${point.description}</p>
        <p><a href="${point.link}" target="_blank" rel="noopener noreferrer">Open link</a></p>
    `);

    new mapboxgl.Marker(el)
        .setLngLat(point.coordinates)
        .setPopup(popup)
        .addTo(map);
});

/* CONNECTING LINE */
map.on('load', () => {
    map.addSource('wilford-route', {
        type: 'geojson',
        data: {
            type: 'Feature',
            geometry: {
                type: 'LineString',
                coordinates: routePoints.map(point => point.coordinates)
            }
        }
    });

    map.addLayer({
        id: 'wilford-route-line',
        type: 'line',
        source: 'wilford-route',
        layout: {
            'line-join': 'round',
            'line-cap': 'round'
        },
        paint: {
            'line-color': '#ff003c',
            'line-width': 4,
            'line-opacity': 0.9
        }
    });
});

spinGlobe();
</script>

</body>
</html>
